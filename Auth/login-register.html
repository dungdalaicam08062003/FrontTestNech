<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Login | Register</title>
    <link rel="stylesheet" href="./auth.css" />
</head>

<body>

    <div class="auth-container" id="authContainer">

        <!-- ================= REGISTER ================= -->
        <div class="form-container sign-up-container">
            <form id="registerForm" autocomplete="off">
                <h1>Create Account</h1>

                <div class="social-container">
                    <span class="social fb">f</span>
                    <span class="social google">G+</span>
                    <span class="social linkedin">in</span>
                </div>

                <span>or use your email for registration</span>

                <input type="text" placeholder="Name" />
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />

                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
        </div>

        <!-- ================= LOGIN ================= -->
        <div class="form-container sign-in-container">
            <form id="loginForm" autocomplete="off">
                <h1>Sign in</h1>

                <div class="social-container">
                    <span class="social fb">f</span>
                    <span class="social google">G+</span>
                    <span class="social linkedin">in</span>
                </div>

                <span>or use your account</span>

                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <a href="javascript:void(0)">Forgot your password?</a>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>

        <!-- ================= OVERLAY ================= -->
        <div class="overlay-container">
            <div class="overlay">

                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>
                        To keep connected with us<br />
                        please login with your personal info
                    </p>
                    <button class="btn-outline" id="signInBtn">Sign In</button>
                </div>

                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>
                        Enter your personal details<br />
                        and start journey with us
                    </p>
                    <button class="btn-outline" id="signUpBtn">Sign Up</button>
                </div>

            </div>
        </div>

    </div>

    <script src="./auth.js"></script>
    <script type="module" src="./auth.js"></script>

</body>
</html>
